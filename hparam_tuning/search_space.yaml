# search_space.yaml
parameters:

  experiment.optim.lr:           
    type: float             
    min: 5.0e-6
    max: 2.0e-3
    log: true 

  experiment.model.nflows:
    type: int
    min: 12
    max: 28
    step: 1

  experiment.model.nbins:
    type: int
    min: 9
    max: 25
    step: 2

  experiment.model.tail_bound:
    type: float
    min: 3.0
    max: 11.0

