training_folder: /workspace/config/Config100p10_noDet/best_models_1day/top1
save_dir:        ${training_folder}/ess_100k_ep58000
run_without_mcmc: true
mcmc_chain: /workspace/config/GundamWorkspace/output/gundamFitter_configToyOA_With_configMcmcToy_Asimov.root

num_samples: 100000
batch_size: 4098
bins: 200
plot_workers: 0
llh_workers: 10 # if 0, do not use multiprocessing for llh computation

# --- Checkpoint selection -----------------------------------------------------
# custom_epochs: explicit list of REAL epoch numbers to evaluate (epoch 0 is the
# Gaussian baseline, always included). Checkpoints are sampler_epoch<EPOCH>.pt,
# e.g. epoch 500 -> sampler_epoch00500.pt. Set to null (or remove) to fall back
# to the equally-spaced n_checkpoints selection below.
custom_epochs: [58000]
n_checkpoints: 10 # used only when custom_epochs is null: number of NF checkpoints (roughly equally spaced)
max_epoch: null # used only when custom_epochs is null: if set (real epochs), ignore later checkpoints and pick n_checkpoints within [0, max_epoch]

# --- Epoch -> x-axis linear conversions (y = A*epoch + b) ---------------------
# Wall-clock time [hours]: A = time_ref_hours / time_ref_epochs, b = 0.
time_ref_epochs: 56000
time_ref_hours: 23.333333333  # 23 h 20 min
# Number of LH samplings: b = samplings_base (samples present at epoch 0),
# A = (sum of "generated" over samplings_progress_glob) / samplings_ref_epoch.
samplings_base: 2500000
samplings_progress_glob: ${training_folder}/generated_samples/progress_*.json
samplings_ref_epoch: null  # null -> use the maximum available checkpoint epoch as the training span

# Marginal-evolution scan: one figure per index, one subpanel per checkpoint epoch.
# Indices span LIN (0-59), DET (60-99 -- the band with the right-shift bias),
# and SPL (100-109). Set to [] to disable.
marginal_scan_param_indices: [0, 30, 65, 89, 96, 100]
marginal_scan_bins: 60

verbose: 0

#3: print also NLL status every 40 iterations

select_regex: ""

device: cuda

hydra:
  run:
    dir: ${save_dir}
  output_subdir: null
  job:
    chdir: true
