# mcmc_pygundam.yaml
#
# Parallel MCMC using the Python LikelihoodSampler wrapper.
#
# mode: parallel_tempering   (default)
#   N workers at temperatures β₁=1 > β₂ > … > βₙ.  Hot chains explore; the
#   cold chain (β=1) samples the target.  Workers run in parallel processes,
#   each owning its own LikelihoodSampler.  Swaps every swap_interval steps.
#
# mode: independent
#   N fully independent chains (same initialisation, different seeds).
#   Zero communication.  Output is merged into one .npz at the end.
#   Wall-clock time ≈ 1 chain; gives N× more samples and R-hat diagnostics.
#
# SLURM:  cpus-per-task = n_chains * threads_per_chain

defaults:
  - override hydra/job_logging: disabled
  - _self_

# ── GUNDAM likelihood ─────────────────────────────────────────────────────────
likelihood:
  config: /workspace/config/Config100p10_noDet/gundamFitter_configToyOA_100plus10_noDet.root
  overrides: []
  threads_per_chain: 4   # OMP threads per worker; total CPUs = n_chains * threads_per_chain
  asimov: false

# ── Mode ─────────────────────────────────────────────────────────────────────
mode: parallel_tempering   # "parallel_tempering" | "independent"

# ── Chains / temperatures ─────────────────────────────────────────────────────
n_chains: 4          # number of parallel workers / temperature levels
# PT: temperatures can be set explicitly or auto-generated (geometric spacing).
# temperatures: [1.0, 0.5, 0.2, 0.05]   # uncomment to override auto
beta_min:  0.05      # hottest temperature (ignored if temperatures is set)
# Independent: uses n_chains independent chains, all at β=1.

# ── Chain length ──────────────────────────────────────────────────────────────
seed:    42
n_steps: 100000     # production steps (cold chain only for PT)
burn_in:  10000     # burn-in + adaptation steps (discarded)

# ── PT: swap schedule ─────────────────────────────────────────────────────────
swap_interval: 50   # steps between swap attempts (shorter = more swaps = better mixing)

# ── Proposal / adaptation ─────────────────────────────────────────────────────
# Proposal: x' = x + σ · chol(postfit_cov) @ z,  z ~ N(0, I)
initial_scale:     1.0     # starting σ per chain
target_acceptance: 0.234   # Robbins-Monro target (Roberts+1997 optimal for high-D)
adapt_rate:      1.0
adapt_lag:     100.0
adapt_exponent:  0.6

# ── Plots ────────────────────────────────────────────────────────────────────
plot_every:      50000   # corner plot every N production steps (overwrites previous)
n_corner_params: 10      # number of parameters shown when xsec_only=false
xsec_only:       true    # if true, show only Non-Linear (cross-section spline) parameters

# ── Output ───────────────────────────────────────────────────────────────────
out_file: mcmc_pygundam.npz
save_dir: /workspace/output   # set to null to use Hydra output dir

# ── Hydra ────────────────────────────────────────────────────────────────────
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
  output_subdir: null
  job:
    chdir: true
