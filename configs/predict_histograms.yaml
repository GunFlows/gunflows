# training_folder: /workspace/work/GuNFlows/outputs/demo_60p6_asimov/2026-01-20/17-57-28/
# training_folder: /workspace/work/GuNFlows/outputs/demo_100p10_asimov/2026-03-18/19-46-28/
# training_folder: /workspace/work/GuNFlows/outputs/2026-03-30/16-10-28/

# mcmc_chain: /workspace/config/GundamWorkspace/output/gundamFitter_configToyOA_With_configMcmcToy_Asimov.root

training_folder: /workspace/trained_models/17-30-29
mcmc_chain: /workspace/trained_models/DemoMCMC_configToyOA_100plus10_noDet_8130780.root

# save_dir: /home/shares/sanchezf/gundam_n_flow/trained_models/outputs_sample_and_compare/100p10Asimov
# save_dir: /workspace/trained_models/outputs_sample_and_compare/100p10Toy50
save_dir: ${training_folder}/predict_histograms_100k_test


threads: 24
num_samples: 100000
batch_size: 4098

# Custom bin edges (takes priority over n_bins/enu_min/enu_max).
# Default: 200 MeV bins up to 0.4 GeV, 50 MeV bins 0.4–1 GeV, then [1,2] and [2,5] GeV.
bin_edges_list: [0.0, 0.2, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95, 1.0, 2.0, 5.0]
enu_var: "Enu"
seed: 0

# Extra GUNDAM override files.
# mcKinStorage.yaml caches Enu + isRHC + Pmu + CosThetamu in one pass.
# WARNING: GUNDAM replaces additionalLeavesStorage on override, so only one
# storage override should be active at a time.
llh_extra_overrides:
  - "override/mcKinStorage.yaml"

# Extra kinematic variables filled alongside Enu in a single MC event pass.
# Pmu in MeV/c; CosThetamu dimensionless [-1, 1].
# Bin edges are the 1-D marginal projections of the analysis binning.
extra_vars:
  - name: "Pmu"
    bin_edges: [0, 200, 300, 400, 500, 600, 700, 800, 900, 1000, 1200, 1500, 2000, 3000, 5000]
  - name: "CosThetamu"
    bin_edges: [0.5, 0.6, 0.7, 0.8, 0.85, 0.9, 0.92, 0.94, 0.96, 0.98, 1.0]

# do_reweight_nf: true

# mcmc_burnin_frac: 0. # no need if I take only the last 200k steps
# mcmc_thin: 1
# mcmc_max_steps: 200000

# reweight_num_workers: 2


# select_regex: ""

use_mcmc: true
# mcmc_chain: /workspace/config/output/your_mcmc_file.root
# mcmc_burnin_frac: 0.0
# mcmc_max_steps: null
# mcmc_thin: null

device: cuda

hydra:
  run:
    dir: ${save_dir}
  output_subdir: null
  job:
    chdir: true
