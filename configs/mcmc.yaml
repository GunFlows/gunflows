defaults:
  - override hydra/job_logging: disabled
  - _self_

likelihood:
  sampler_target: apps.gundam.likelihoodSampler.LikelihoodSampler
  config: /workspace/config/Config100p10_noDet/gundamFitter_configToyOA_100plus10_noDet.root
  overrides: []
  threads_per_chain: 4
  asimov: false

mode: parallel_tempering

n_chains: 4
beta_min:  0.05

seed:    42
n_steps: 100000
burn_in:  10000

swap_interval: 50

initial_scale:     1.0
target_acceptance: 0.234
adapt_rate:      1.0
adapt_lag:     100.0
adapt_exponent:  0.6

plot_every:      50000
n_corner_params: 10
xsec_only:       true

out_file: mcmc.npz
save_dir: /workspace/output

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
  output_subdir: null
  job:
    chdir: true
