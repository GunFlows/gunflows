# Streaming training: covariance first, then NF-refresh each stage
defaults:
  - /dataset: systematic_dataset_60plus6_toy
  - /sampler: llhsampler
  - /model: model_demonstrator_60plus6.yaml
  - /optim: adam
  - /scheduler: exponential
  - /trainer: oa2022_pygundam
  - _self_

seed: 42

paths:
  checkpoints_dir: ${hydra:runtime.output_dir}/checkpoints
