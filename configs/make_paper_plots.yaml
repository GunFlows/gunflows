# make_paper_plots.yaml
#
# First run  : computes everything via GUNDAM + NF, saves to <save_dir>/cache/
# Later runs : loads from cache, skips GUNDAM entirely.
# Use force_recompute: true to redo inference from scratch.

training_folder: /workspace/trained_models/17-30-29
save_dir: ${training_folder}/paper_plots

device: cuda   # "cpu" for CPU-only, "cuda" when a GPU is allocated

# ── GUNDAM override (must cache Enu + isRHC + Pmu + CosThetamu) ───────────
llh_extra_overrides:
  - "override/mcKinStorage.yaml"

# ── Sampling ─────────────────────────────────────────────────────────────────
num_samples:  200000
batch_size:   4096
save_every:   10000
seed:         0

use_nf:       true
use_gaussian: true
use_mcmc:     true

mcmc_chain: /workspace/trained_models/DemoMCMC_configToyOA_100plus10_noDet_8185923.root
mcmc_burnin_frac: 0.0   # fraction of the chain dropped from the start before thinning
mcmc_burnin: null       # absolute burn-in steps dropped from the FRONT (overrides
                        # mcmc_burnin_frac when set). e.g. 200000
# mcmc_thin: 1          # stride; default = uniform thinning to num_samples across the chain

# Recompute ONLY the MCMC part (spectra + mcmc_samples), reusing the cached
# NF/Gaussian throws. Useful after changing the MCMC chain.
# WARNING: re-propagates all num_samples MCMC throws through GUNDAM (slow).
force_recompute_mcmc: false

# Fast MCMC refresh: reload the chain → mcmc_samples.npy (corners + 5×2
# marginals_overlay) WITHOUT any GUNDAM propagation. Kinematic MCMC spectra stay
# as cached. Runs in seconds. Use force_recompute_mcmc to also redo the spectra.
mcmc_params_only: false

# ── GUNDAM threading ─────────────────────────────────────────────────────────
threads:             24      # threads for the main (histogram-loop) sampler
# Parallel histogram fill: N workers, each with its own full-data sampler +
# event cache. 1 = serial (single sampler). Each worker loads full GUNDAM data,
# so watch memory when raising this.
hist_num_workers:    1

# ── NLL comparison plots ─────────────────────────────────────────────────────
do_nll_plots:        true
n_nll_samples:       20000
reweight_num_workers: 16     # parallel GUNDAM NLL evals (each worker = 1 sampler)

# ── Kinematic variables ───────────────────────────────────────────────────────
enu_var: "Enu"
# Flux quantile binning (5%-quantile edges), truncated at 2.81695 GeV.
bin_edges_list: [0.0, 0.440051, 0.509892, 0.564608, 0.603634, 0.642659, 0.681685,
                 0.723975, 0.766277, 0.808579, 0.874964, 0.948421, 1.07833,
                 1.28925, 1.61102, 2.10663, 2.81695]

extra_vars:
  - name: "Pmu"
    bin_edges: [0, 200, 300, 400, 500, 600, 700, 800, 900, 1000, 1200, 1500,
                2000, 3000, 5000]
  - name: "CosThetamu"
    bin_edges: [0.5, 0.6, 0.7, 0.8, 0.85, 0.9, 0.92, 0.94, 0.96, 0.98, 1.0]

# Labels and per-variable plot options (bin edges come from the cache)
variables:
  - name:   "Enu"
    xlabel: "$E_{\\nu}$ [GeV]"
    spectrum_width_scale: 1.1     # slightly wider spectrum
    violin_font_scale:    1.4     # larger axis labels in Enu violin
    violin_tick_scale:    1.3     # larger tick values too (all fonts bigger)
    sigma_legend_loc:     "upper right"   # NF−Gaussian legend in spectrum_sigma
    sigma_font_scale:     1.4             # bigger fonts (labels+ticks) in Enu spectrum_sigma
    sigma_drop_last:      0               # keep all bins in spectrum_sigma

  - name:   "Pmu"
    xlabel: "$p_{\\mu}$ [MeV/$c$]"
    spectrum_font_scale:  1.25    # bigger spectrum x label
    violin_font_scale:    1.35    # bigger violin axis labels (ticks unchanged)
    violin_height_scale:  1.2     # +20% height (fonts scale accordingly)
    sigma_legend_loc:     "upper right"   # NF−Gaussian legend in spectrum_sigma
    sigma_drop_last:      0               # keep all bins in spectrum_sigma

  - name:   "CosThetamu"
    xlabel: "$\\cos\\theta_{\\mu}$"
    spectrum_font_scale:  1.30    # bigger spectrum x label
    violin_font_scale:    1.35    # bigger violin axis labels (ticks unchanged)
    violin_height_scale:  1.2     # +20% height (fonts scale accordingly)
    legend_loc_spectrum:  "upper left"
    legend_loc_violin:    "upper center"

# ── Plot options ──────────────────────────────────────────────────────────────
ci_levels:        [0.6827, 0.9545, 0.9973]
n_corner_params:  10
# MCMC points kept for the corner / marginal plots (parameter-space only, no
# GUNDAM propagation). Thinned uniformly across the WHOLE post-burn-in chain, so
# many more than num_samples gives smooth, representative marginals.
n_corner_mcmc:    200000
fig_format:       "pdf"    # "pdf" or "png"
force_recompute:  false

# spectrum_sigma_3: produced only when the run has MORE throws than
# sigma3_subsample (e.g. a 200k run). Displays the first sigma3_subsample throws;
# the Δσ ±68% CI is bootstrapped (with replacement, sigma3_n_boot draws) at that
# size from the full pool. Δσ bar = point estimate on the displayed sample.
do_sigma3:          false     # set true to also produce the (slow) bootstrap spectrum_sigma_3
sigma3_n_boot:      200
sigma3_subsample:   100000

# ── HEP label ─────────────────────────────────────────────────────────────────
hep_label:    "T2K"
hep_sublabel: "Preliminary"

# ── Hydra ─────────────────────────────────────────────────────────────────────
hydra:
  run:
    dir: ${save_dir}
  output_subdir: null
  job:
    chdir: true
